name: Conformance

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: "0 3 * * 1" # Weekly Monday 3 AM UTC for Tier 3+

jobs:
    tier1:
        name: Tier 1 - Quick
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4
            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential liblua5.4-dev
            - name: Build
              run: make lib RELEASE=1
            - name: Build conformance
              run: make conformance RELEASE=1
            - name: Run Tier 1
              run: ./build/conformance_runner --tier=1 --width=640 --height=480 --output=conformance/results
            - name: Upload results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: conformance-tier1-results
                  path: conformance/results/

    tier2:
        name: Tier 2 - Standard
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential liblua5.4-dev
            - name: Build
              run: make lib RELEASE=1
            - name: Build conformance
              run: make conformance RELEASE=1
            - name: Run Tier 2
              run: ./build/conformance_runner --tier=2 --width=1920 --height=1080 --output=conformance/results
            - name: Upload results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: conformance-tier2-results
                  path: conformance/results/

    tier3:
        name: Tier 3 - Full (Nightly)
        runs-on: ubuntu-latest
        timeout-minutes: 60
        if: github.event_name == 'schedule'
        steps:
            - uses: actions/checkout@v4
              with:
                  lfs: true
            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential liblua5.4-dev
            - name: Build
              run: make lib RELEASE=1
            - name: Build conformance
              run: make conformance RELEASE=1
            - name: Run Tier 3
              run: ./build/conformance_runner --tier=3 --width=1920 --height=1080 --output=conformance/results --golden=conformance/baselines
            - name: Upload results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: conformance-tier3-results
                  path: conformance/results/
