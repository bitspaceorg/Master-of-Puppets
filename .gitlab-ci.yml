stages:
  - build
  - test
  - docs
  - conformance

# Every job delegates to ci/linux.sh.  Run `make ci-linux CI_JOB=<name>`
# locally (on any OS with docker) to reproduce byte-identically.

variables:
  GIT_DEPTH: 1

# Nix-based CI. The toolchain is pinned by flake.lock, so every job gets
# byte-identical gcc/clang/lua regardless of which runner picks it up.
default:
  image: nixos/nix:2.25.2
  before_script:
    - mkdir -p /etc/nix
    - |
      cat >> /etc/nix/nix.conf <<'EOF'
      experimental-features = nix-command flakes
      accept-flake-config = true
      sandbox = false
      EOF
    - nix --version

# --- Build ---
build:linux-gcc:
  stage: build
  script: ["sh ci/linux.sh build-gcc"]

build:linux-clang:
  stage: build
  script: ["sh ci/linux.sh build-clang"]

# --- Test ---
test:linux-gcc:
  stage: test
  script: ["sh ci/linux.sh test-gcc"]

test:linux-clang:
  stage: test
  script: ["sh ci/linux.sh test-clang"]

# --- Docs ---
# Broken slug links + compile-test every fenced ```c block with int main(.
# See tools/docs/README.md.
docs:check:
  stage: docs
  script: ["sh ci/linux.sh docs"]

# --- Conformance ---
# Live-viewport render health: no Vulkan validation errors, no sync hazards,
# no NaN pixels, CPU byte-level determinism, valid pick results.  See
# conformance/runner.c.
conformance:check:
  stage: conformance
  timeout: 5 minutes
  script: ["sh ci/linux.sh conformance"]
