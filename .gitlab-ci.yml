stages:
  - build
  - test
  - docs
  - conformance

variables:
  GIT_DEPTH: 1

# Nix-based CI. The toolchain is pinned by flake.lock, so every job gets
# byte-identical gcc/clang/lua regardless of which runner picks it up.
default:
  image: nixos/nix:2.25.2
  before_script:
    - mkdir -p /etc/nix
    - |
      cat >> /etc/nix/nix.conf <<'EOF'
      experimental-features = nix-command flakes
      accept-flake-config = true
      sandbox = false
      EOF
    - nix --version
    # Warm the flake so timing later reflects the real work, not eval.
    - nix develop .#ci --no-update-lock-file -c true

# --- Build ---
.build_template: &build_template
  stage: build

build:linux-gcc:
  <<: *build_template
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make CC=gcc &&
        make clean &&
        make RELEASE=1 CC=gcc'

build:linux-clang:
  <<: *build_template
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make CC=clang &&
        make clean &&
        make RELEASE=1 CC=clang'

# --- Test ---
test:linux-gcc:
  stage: test
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make CC=gcc &&
        make CC=gcc test'

test:linux-clang:
  stage: test
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make CC=clang &&
        make CC=clang test'

# --- Docs ---
#
# Fast check: broken slug links + compile-test every ```c block that has
# `int main(`.  See tools/docs/README.md.
docs:check:
  stage: docs
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make CC=clang &&
        make docs-check'

# --- Conformance ---
.conformance_template: &conformance_template
  stage: conformance
  artifacts:
    when: always
    paths:
      - conformance/results/

conformance:tier1:
  <<: *conformance_template
  timeout: 5 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make lib RELEASE=1 &&
        make conformance RELEASE=1 &&
        ./build/conformance_runner --tier=1 --width=640 --height=480 --output=conformance/results'

conformance:tier2:
  <<: *conformance_template
  timeout: 15 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make lib RELEASE=1 &&
        make conformance RELEASE=1 &&
        ./build/conformance_runner --tier=2 --width=1920 --height=1080 --output=conformance/results'

conformance:tier3:
  <<: *conformance_template
  timeout: 60 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make lib RELEASE=1 &&
        make conformance RELEASE=1 &&
        ./build/conformance_runner --tier=3 --width=1920 --height=1080 --output=conformance/results --golden=conformance/baselines'
