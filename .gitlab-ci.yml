stages:
  - build
  - test
  - docs
  - conformance

# Conformance runs against a live viewport and asserts: no Vulkan validation
# errors, no sync hazards, no NaN pixels, CPU byte-level determinism, valid
# pick results.  See conformance/runner.c.

variables:
  GIT_DEPTH: 1

# Nix-based CI. The toolchain is pinned by flake.lock, so every job gets
# byte-identical gcc/clang/lua regardless of which runner picks it up.
default:
  image: nixos/nix:2.25.2
  before_script:
    - mkdir -p /etc/nix
    - |
      cat >> /etc/nix/nix.conf <<'EOF'
      experimental-features = nix-command flakes
      accept-flake-config = true
      sandbox = false
      EOF
    - nix --version
    # Warm the flake so timing later reflects the real work, not eval.
    - nix develop .#ci --no-update-lock-file -c true

# --- Build ---
.build_template: &build_template
  stage: build

build:linux-gcc:
  <<: *build_template
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make CC=gcc &&
        make clean &&
        make RELEASE=1 CC=gcc'

build:linux-clang:
  <<: *build_template
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make CC=clang &&
        make clean &&
        make RELEASE=1 CC=clang'

# --- Test ---
test:linux-gcc:
  stage: test
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make CC=gcc &&
        make CC=gcc test'

test:linux-clang:
  stage: test
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make CC=clang &&
        make CC=clang test'

# --- Docs ---
#
# Fast check: broken slug links + compile-test every ```c block that has
# `int main(`.  See utils/docs/README.md.
docs:check:
  stage: docs
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make CC=clang &&
        make docs-check'

# --- Conformance ---
conformance:check:
  stage: conformance
  timeout: 5 minutes
  script:
    - nix develop .#ci --no-update-lock-file -c sh -c '
        make lib RELEASE=1 &&
        make conformance RELEASE=1 &&
        ./build/conformance_runner --verbose'
